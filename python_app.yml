apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-app-deployment
  labels:
    app: python-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: python-app
  template:
    metadata:
      labels:
        app: python-app
    spec:
      containers:
      - name: python-app
        image: python:3.9-slim
        ports:
        - containerPort: 5000
        command: ["sh", "-c"]
        args:
          - |
            pip install flask && \
            echo "
from flask import Flask
app = Flask(__name__)

@app.route('/')
def hello():
    return 'Hello from Kubernetes Python App!'

app.run(host='0.0.0.0', port=5000)
" > app.py && \
            python app.py